name: Search Engine Test Suite

# This tells GitHub to run the tests every time you push code or create a pull request
on:
  push:
    branches: [ "main", "master", "advanced-ranking" ]
  pull_request:
    branches: [ "main", "master", "advanced-ranking" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code
    - uses: actions/checkout@v4

    # Step 2: Set up a Python environment (matches the version you are using)
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Step 3: Install your project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install requests, beautifulsoup4, and pytest
        pip install -r requirements.txt 

    # Step 4: Run the Pytest suite
    - name: Run Pytest
      run: |
        # Using the module approach to prevent module path errors
        python -m pytest tests/ -v